name: Security

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: TruffleHog
        uses: trufflesecurity/trufflehog@v3.82.3
        with:
          path: .
          base: HEAD~1
          head: HEAD

