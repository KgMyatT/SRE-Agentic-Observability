name: CD

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (dev|staging|prod)"
        required: true
        type: choice
        options: [dev, staging, prod]
      state_backend:
        description: "Terraform state backend mode"
        required: false
        type: choice
        options: ["remote", "artifact", "ephemeral"]
        default: "remote"
      aws_region:
        description: "AWS region (fallback if repo/environment variable not set)"
        required: false
        default: "us-east-1"
      bootstrap_ecr:
        description: "Create ECR repos if missing (requires ecr:CreateRepository)"
        required: false
        type: choice
        options: ["false", "true"]
        default: "false"
      tfstate_key_prefix:
        description: "Terraform state key prefix (defaults to <environment>/terraform.tfstate)"
        required: false
        default: ""

permissions:
  id-token: write   # Mandatory for OIDC handshake
  contents: read    # Mandatory for repository checkout

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    concurrency:
      group: agentic-sre-${{ inputs.environment }}-deploy
      cancel-in-progress: false
    
    env:
      # Fixes Node.js 20 Deprecation Warn & Terminal blocks for June 2026
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      AWS_REGION: ${{ vars.AWS_REGION || secrets.AWS_REGION || inputs.aws_region }}
      TFSTATE_BUCKET: ${{ vars.TFSTATE_BUCKET || secrets.TFSTATE_BUCKET }}
      TFLOCK_TABLE: ${{ vars.TFLOCK_TABLE || secrets.TFLOCK_TABLE }}
      TFSTATE_REGION: ${{ vars.TFSTATE_REGION || secrets.TFSTATE_REGION || vars.AWS_REGION || secrets.AWS_REGION || inputs.aws_region }}
      TFSTATE_KEY: ${{ inputs.tfstate_key_prefix != '' && format('{0}/{1}', inputs.tfstate_key_prefix, 'terraform.tfstate') || format('{0}/{1}', inputs.environment, 'terraform.tfstate') }}

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Preflight (required vars/secrets)
        shell: bash
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
        run: |
          set -euo pipefail
          if [[ -z "${AWS_ROLE_ARN:-}" ]]; then
            echo "Missing required secret: AWS_ROLE_ARN (set it at repo or environment level)." >&2
            exit 1
          fi
          if [[ ! "$AWS_ROLE_ARN" =~ ^arn:(aws|aws-us-gov|aws-cn):iam::[0-9]{12}:role\/[A-Za-z0-9+=,.@_/-]+$ ]]; then
            echo "Invalid AWS_ROLE_ARN format. Expected: arn:aws:iam::<12-digit-account-id>:role/<role-name>" >&2
            echo "Got (masked): ${AWS_ROLE_ARN:0:16}***" >&2
            exit 1
          fi
          if [[ -z "${AWS_REGION:-}" ]]; then
            echo "Missing AWS region. Set repo/environment variable AWS_REGION, or secret AWS_REGION, or pass workflow input aws_region." >&2
            exit 1
          fi
          if [[ "${{ inputs.state_backend }}" == "remote" ]]; then
            if [[ -z "${TFSTATE_BUCKET:-}" ]]; then
              echo "Missing TFSTATE_BUCKET. Create backend via terraform/backend then set repo/environment variable TFSTATE_BUCKET." >&2
              exit 1
            fi
            if [[ -z "${TFLOCK_TABLE:-}" ]]; then
              echo "Missing TFLOCK_TABLE. Create backend via terraform/backend then set repo/environment variable TFLOCK_TABLE." >&2
              exit 1
            fi
            if [[ "${TFSTATE_BUCKET}" == CHANGE_ME-* ]] || [[ "${TFLOCK_TABLE}" == CHANGE_ME-* ]]; then
              echo "TFSTATE_BUCKET/TFLOCK_TABLE still contains CHANGE_ME placeholders. Set real values from terraform/backend outputs." >&2
              exit 1
            fi
          else
            echo "Using non-remote Terraform state backend: ${{ inputs.state_backend }}"
            echo "NOTE: This is not production-grade. Prefer remote state (S3+DynamoDB) for real deployments."
          fi

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repositories exist (optional)
        if: ${{ inputs.bootstrap_ecr == 'true' }}
        shell: bash
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          set -euo pipefail
          repos=(agentic-sre-api agentic-sre-worker agentic-sre-alloy)
          for r in "${repos[@]}"; do
            if aws ecr describe-repositories --repository-names "$r" --region "$AWS_REGION" >/dev/null 2>&1; then
              echo "ECR repo exists: $r"
            else
              echo "Creating ECR repo: $r"
              aws ecr create-repository \
                --repository-name "$r" \
                --image-scanning-configuration scanOnPush=true \
                --encryption-configuration encryptionType=AES256 \
                --region "$AWS_REGION" >/dev/null
            fi
          done

      - name: Build & Push Service Container Images
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ENV: ${{ inputs.environment }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          docker build -f services/python/Dockerfile.api -t "$REGISTRY/agentic-sre-api:$ENV-$SHA" services/python
          docker build -f services/python/Dockerfile.worker -t "$REGISTRY/agentic-sre-worker:$ENV-$SHA" services/python
          docker build -f services/alloy/Dockerfile -t "$REGISTRY/agentic-sre-alloy:$ENV-$SHA" services/alloy
          
          docker push "$REGISTRY/agentic-sre-api:$ENV-$SHA"
          docker push "$REGISTRY/agentic-sre-worker:$ENV-$SHA"
          docker push "$REGISTRY/agentic-sre-alloy:$ENV-$SHA"

      - name: Setup HashiCorp Terraform CLI
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.5"

      - name: Restore Terraform state (artifact)
        if: ${{ inputs.state_backend == 'artifact' }}
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: tfstate-${{ inputs.environment }}
          path: terraform/envs/${{ inputs.environment }}

      - name: Disable remote backend (artifact/ephemeral)
        if: ${{ inputs.state_backend != 'remote' }}
        working-directory: terraform/envs/${{ inputs.environment }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f backend.tf ]]; then
            mv backend.tf backend.tf.disabled
          fi

      - name: Terraform Initialize
        working-directory: terraform/envs/${{ inputs.environment }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ inputs.state_backend }}" == "remote" ]]; then
            terraform init \
              -backend-config="bucket=${TFSTATE_BUCKET}" \
              -backend-config="key=${TFSTATE_KEY}" \
              -backend-config="region=${TFSTATE_REGION}" \
              -backend-config="dynamodb_table=${TFLOCK_TABLE}" \
              -backend-config="encrypt=true"
          else
            terraform init -backend=false
          fi

      - name: Terraform Plan
        working-directory: terraform/envs/${{ inputs.environment }}
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ENV: ${{ inputs.environment }}
          SHA: ${{ github.sha }}
          TF_VAR_container_images: >-
            {"api":"${{ steps.login-ecr.outputs.registry }}/agentic-sre-api:${{ inputs.environment }}-${{ github.sha }}",
             "analyzer":"${{ steps.login-ecr.outputs.registry }}/agentic-sre-worker:${{ inputs.environment }}-${{ github.sha }}",
             "planner":"${{ steps.login-ecr.outputs.registry }}/agentic-sre-worker:${{ inputs.environment }}-${{ github.sha }}",
             "executor":"${{ steps.login-ecr.outputs.registry }}/agentic-sre-worker:${{ inputs.environment }}-${{ github.sha }}",
             "alloy":"${{ steps.login-ecr.outputs.registry }}/agentic-sre-alloy:${{ inputs.environment }}-${{ github.sha }}"}
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: terraform/envs/${{ inputs.environment }}
        env:
          TF_VAR_container_images: >-
            {"api":"${{ steps.login-ecr.outputs.registry }}/agentic-sre-api:${{ inputs.environment }}-${{ github.sha }}",
             "analyzer":"${{ steps.login-ecr.outputs.registry }}/agentic-sre-worker:${{ inputs.environment }}-${{ github.sha }}",
             "planner":"${{ steps.login-ecr.outputs.registry }}/agentic-sre-worker:${{ inputs.environment }}-${{ github.sha }}",
             "executor":"${{ steps.login-ecr.outputs.registry }}/agentic-sre-worker:${{ inputs.environment }}-${{ github.sha }}",
             "alloy":"${{ steps.login-ecr.outputs.registry }}/agentic-sre-alloy:${{ inputs.environment }}-${{ github.sha }}"}
        run: terraform apply -auto-approve tfplan

      - name: Persist Terraform state (artifact)
        if: ${{ inputs.state_backend == 'artifact' }}
        uses: actions/upload-artifact@v4
        with:
          name: tfstate-${{ inputs.environment }}
          path: |
            terraform/envs/${{ inputs.environment }}/terraform.tfstate
            terraform/envs/${{ inputs.environment }}/terraform.tfstate.backup

      - name: Ephemeral cleanup (destroy)
        if: ${{ inputs.state_backend == 'ephemeral' }}
        working-directory: terraform/envs/${{ inputs.environment }}
        env:
          TF_VAR_container_images: >-
            {"api":"${{ steps.login-ecr.outputs.registry }}/agentic-sre-api:${{ inputs.environment }}-${{ github.sha }}",
             "analyzer":"${{ steps.login-ecr.outputs.registry }}/agentic-sre-worker:${{ inputs.environment }}-${{ github.sha }}",
             "planner":"${{ steps.login-ecr.outputs.registry }}/agentic-sre-worker:${{ inputs.environment }}-${{ github.sha }}",
             "executor":"${{ steps.login-ecr.outputs.registry }}/agentic-sre-worker:${{ inputs.environment }}-${{ github.sha }}",
             "alloy":"${{ steps.login-ecr.outputs.registry }}/agentic-sre-alloy:${{ inputs.environment }}-${{ github.sha }}"}
        run: terraform destroy -auto-approve
