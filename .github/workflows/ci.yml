name: CI

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/envs/dev
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.5"
      - name: Terraform fmt
        run: terraform fmt -check -recursive ../../
      - name: Terraform init (no backend)
        run: terraform init -backend=false
      - name: Terraform validate
        run: terraform validate
      - name: TFLint
        uses: terraform-linters/setup-tflint@v4
      - name: Run tflint
        run: |
          cd ../..
          tflint --init
          tflint --recursive
      - name: Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform
          quiet: true
          soft_fail: true

  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Ruff
        run: ruff check .
      - name: Pytest
        run: pytest -q

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f services/python/Dockerfile.api services/python
      - name: Build worker image
        run: docker build -f services/python/Dockerfile.worker services/python
      - name: Build alloy image
        run: docker build -f services/alloy/Dockerfile services/alloy
