[SERVICE]
    Flush        1
    Log_Level    info
    Parsers_File parsers.conf

[INPUT]
    Name  forward
    Listen 0.0.0.0
    Port 24224

[FILTER]
    Name   record_modifier
    Match  *
    Record platform agentic-sre

[OUTPUT]
    Name  loki
    Match *
    Host  ${GRAFANA_LOKI_HOST}
    Port  443
    TLS   On
    HTTP_User ${GRAFANA_LOKI_USER}
    HTTP_Passwd ${GRAFANA_API_KEY}
    Labels job=ecs,env=${ENVIRONMENT},service=$container_name
    Line_Format json
    URI /loki/api/v1/push

